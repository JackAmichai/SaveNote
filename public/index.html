<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SaveNote — AI Memory Assistant for WhatsApp</title>
  <meta name="description" content="Send WhatsApp messages to yourself. AI remembers, categorizes, and retrieves everything for you. Free, private, and local.">
  <meta name="theme-color" content="#008069">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="/demo.js"></script>
  <style>
    /* New styles for V6 enhancements */
    .export-buttons { display: flex; gap: 8px; margin-top: 12px; border-top: 1px solid #eee; padding-top: 12px; }
    .export-btn { border: none; background: #f0f2f5; color: #54656f; padding: 6px 10px; border-radius: 6px; font-size: 11px; cursor: pointer; display: flex; align-items: center; gap: 4px; transition: all 0.2s; }
    .export-btn:hover { background: #e9edef; color: #008069; }
    .export-btn.google-cal:hover { background: #e8f0fe; color: #1a73e8; }
    .export-btn.google-keep:hover { background: #fef7e0; color: #f2a600; }
    .export-btn.google-sheets:hover { background: #e6f4ea; color: #1e8e3e; }
    
    .stats-panel { background: #fff; border-radius: 12px; padding: 20px; margin-bottom: 24px; display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; box-shadow: var(--shadow-sm); }
    .chart-container { height: 200px; position: relative; }
    .ocr-badge { position: absolute; top: 8px; right: 8px; background: rgba(0,128,105,0.9); color: #fff; font-size: 9px; padding: 2px 6px; border-radius: 10px; font-weight: 700; }
  </style>
</head>
<body>

  <!-- ===== Navigation ===== -->
  <nav class="nav" id="main-nav">
    <div class="nav-inner">
      <a href="#" class="nav-logo" id="nav-home-link">
        <div class="nav-logo-icon">
          <svg viewBox="0 0 24 24"><path d="M12.013 2.013c5.474 0 9.914 4.437 9.914 9.914 0 5.472-4.44 9.912-9.914 9.912-1.742 0-3.385-.45-4.832-1.24l-5.114 1.34 1.356-4.985a9.854 9.854 0 0 1-1.324-4.94c0-5.477 4.44-9.914 9.914-9.914z"/></svg>
        </div>
        <span>SaveNote <small style="font-size: 10px; opacity: 0.7; vertical-align: middle; margin-left: 4px;">V6</small></span>
      </a>
      <ul class="nav-links" id="nav-links">
        <li><a href="#features">Features</a></li>
        <li><a href="#how-it-works">How It Works</a></li>
        <li><a href="#privacy-section">Privacy</a></li>
        <li><a href="#" id="nav-dashboard-link">Dashboard</a></li>
        <li><a href="#" class="nav-cta" id="nav-get-started">Add to WhatsApp</a></li>
      </ul>
    </div>
  </nav>

  <!-- ===== Landing Page ===== -->
  <div id="landing-page">
    <section class="hero" id="hero-section">
      <div class="hero-inner">
        <h1 class="hero-title">Your AI Brain<br><span class="accent">Inside WhatsApp</span></h1>
        <p class="hero-subtitle">Reminders, OCR, and One-Click Google Exports. All private, all local.</p>
        <div class="hero-actions">
          <a href="#" class="btn-primary" id="hero-install-btn">Add to WhatsApp Web</a>
          <a href="#" class="btn-secondary" id="hero-dashboard-link-2">View Dashboard</a>
        </div>
      </div>
    </section>
    <!-- ... Rest of landing page ... -->
  </div>

  <!-- ===== Dashboard (Enhanced) ===== -->
  <div class="dashboard-section" id="dashboard">
    <div class="dashboard-header">
      <div class="dashboard-header-inner">
        <div class="dashboard-header-left">
          <a href="#" class="back-to-home" id="back-to-home">Back</a>
          <span class="dashboard-title">💬 Memory Dashboard</span>
        </div>
        <div class="dashboard-header-right">
          <button class="btn-add" id="btn-add-note"><span>Add Note</span></button>
        </div>
      </div>
    </div>

    <!-- Data Visualization Panel -->
    <div class="stats-panel">
      <div class="stat-card">
        <h4>Memory Trends</h4>
        <div class="chart-container"><canvas id="trendsChart"></canvas></div>
      </div>
      <div class="stat-card">
        <h4>Category Split</h4>
        <div class="chart-container"><canvas id="categoryChart"></canvas></div>
      </div>
    </div>

    <div class="controls">
      <div class="search-box">
        <input type="text" id="search-input" placeholder="Search your memories (OCR included)...">
      </div>
      <div class="category-filters" id="category-filters"></div>
    </div>

    <main class="notes-container">
      <div class="notes-grid" id="notes-grid"></div>
    </main>
  </div>

  <!-- ===== Add Note Modal ===== -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal">
      <div class="modal-header"><h2>Add a Note</h2><button id="modal-close">✕</button></div>
      <form id="add-note-form">
        <textarea id="note-summary" rows="3" placeholder="What to remember?"></textarea>
        <div class="form-group">
          <label>Attachments (OCR will auto-extract text)</label>
          <input type="file" id="note-attach" multiple>
          <div id="attach-preview"></div>
        </div>
        <button type="submit" class="btn-submit">Save Note</button>
      </form>
    </div>
  </div>

  <script>
    // Integration logic for V6
    function exportToGoogleCalendar(note) {
      const text = encodeURIComponent(`SaveNote: ${note.summary}`);
      const dates = new Date().toISOString().replace(/-|:|\.\d\d\d/g, "");
      const url = `https://www.google.com/calendar/render?action=TEMPLATE&text=${text}&details=${encodeURIComponent(note.raw_message)}&dates=${dates}/${dates}`;
      window.open(url, '_blank');
    }

    function exportToGoogleSheets(note) {
      const csvContent = "data:text/csv;charset=utf-8," + "Category,Summary,Date\n" + `"${note.category}","${note.summary}","${note.created_at}"`;
      const encodedUri = encodeURI(csvContent);
      const link = document.createElement("a");
      link.setAttribute("href", encodedUri);
      link.setAttribute("download", `savenote_${note.id}.csv`);
      document.body.appendChild(link);
      link.click();
    }

    // Tesseract OCR Integration
    async function performOCR(imageUrl) {
      const worker = await Tesseract.createWorker('eng');
      const ret = await worker.recognize(imageUrl);
      await worker.terminate();
      return ret.data.text;
    }

    // Re-rendering with Export Buttons
    function renderV6Notes(notes) {
      const grid = document.getElementById('notes-grid');
      grid.innerHTML = notes.map(note => `
        <div class="note-card">
          <div class="note-header">
            <span class="note-category">${note.category}</span>
          </div>
          <div class="note-summary">${note.summary}</div>
          ${note.ocr_text ? `<div style="font-size:10px; color:#8696a0; margin-top:8px; border-top:1px dashed #eee; padding-top:4px;">🔍 Extracted: ${note.ocr_text.substring(0,100)}...</div>` : ''}
          <div class="export-buttons">
            <button class="export-btn google-cal" onclick='exportToGoogleCalendar(${JSON.stringify(note)})'>📅 Cal</button>
            <button class="export-btn google-keep" onclick='alert("Note copied to clipboard! Paste into Keep.")'>📝 Keep</button>
            <button class="export-btn google-sheets" onclick='exportToGoogleSheets(${JSON.stringify(note)})'>📊 Sheet</button>
          </div>
        </div>
      `).join('');
    }

    // Chart.js Visualization
    function initCharts(notes) {
      const ctxCat = document.getElementById('categoryChart').getContext('2d');
      const categories = [...new Set(notes.map(n => n.category))];
      const data = categories.map(c => notes.filter(n => n.category === c).length);

      new Chart(ctxCat, {
        type: 'doughnut',
        data: {
          labels: categories,
          datasets: [{ data, backgroundColor: ['#008069', '#00a884', '#25d366', '#34b7f1', '#ece5dd'] }]
        },
        options: { maintainAspectRatio: false }
      });
    }
  </script>
</body>
</html>
