<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 320px;
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #FFFFFF;
      color: #111B21;
    }
    .popup-header {
      background: #008069;
      color: white;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .popup-header svg { fill: white; }
    .popup-header h1 {
      font-size: 16px;
      font-weight: 600;
    }
    .popup-header p {
      font-size: 12px;
      opacity: 0.85;
      margin-top: 2px;
    }
    .popup-body { padding: 16px 20px; }
    .popup-stat {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px solid #E9EDEF;
      font-size: 14px;
    }
    .popup-stat:last-child { border: none; }
    .popup-stat-value {
      font-weight: 700;
      color: #008069;
    }
    .popup-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 12px;
      margin-top: 12px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.15s;
    }
    .popup-btn-primary {
      background: #008069;
      color: white;
    }
    .popup-btn-primary:hover {
      background: #005C4B;
    }
    .popup-btn svg { fill: currentColor; }
    .popup-footer {
      padding: 12px 20px;
      text-align: center;
      font-size: 11px;
      color: #8696A0;
      border-top: 1px solid #E9EDEF;
    }
    .popup-footer a {
      color: #008069;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="popup-header">
    <svg viewBox="0 0 24 24" width="28" height="28">
      <path d="M12.013 2.013c5.474 0 9.914 4.437 9.914 9.914 0 5.472-4.44 9.912-9.914 9.912-1.742 0-3.385-.45-4.832-1.24l-5.114 1.34 1.356-4.985a9.854 9.854 0 0 1-1.324-4.94c0-5.477 4.44-9.914 9.914-9.914z"/>
    </svg>
    <div>
      <h1>SaveNote</h1>
      <p>WhatsApp Memory Assistant</p>
    </div>
  </div>

  <div class="popup-body">
    <div class="popup-stat">
      <span>Notes saved</span>
      <span class="popup-stat-value" id="note-count">0</span>
    </div>
    <div class="popup-stat">
      <span>Categories</span>
      <span class="popup-stat-value" id="cat-count">0</span>
    </div>

    <button class="popup-btn popup-btn-primary" id="open-whatsapp">
      <svg viewBox="0 0 24 24" width="18" height="18">
        <path d="M12.013 2.013c5.474 0 9.914 4.437 9.914 9.914 0 5.472-4.44 9.912-9.914 9.912-1.742 0-3.385-.45-4.832-1.24l-5.114 1.34 1.356-4.985a9.854 9.854 0 0 1-1.324-4.94c0-5.477 4.44-9.914 9.914-9.914z"/>
      </svg>
      Open WhatsApp Web
    </button>
  </div>

  <div class="popup-footer">
    <a href="https://github.com/JackAmichai/SaveNote" target="_blank">GitHub</a> · Open Source
  </div>

  <script src="popup.js"></script>
</body>
</html>
